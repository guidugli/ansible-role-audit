---
argument_specs:
  main:
    short_description: Install and configure Linux auditing
    description:
      - Install and configure auditd and deploy selected audit rule templates.
      - This role supports modern Debian, Ubuntu LTS, and Fedora releases.
    options:
      audit_local_events:
        type: bool
        default: true
        description:
          - Include local events in the audit stream.
      audit_skip_grub_check:
        type: bool
        default: false
        description:
          - Skip validation that GRUB contains audit kernel parameters.
      audit_log_file:
        type: str
        default: ''
        description:
          - Full path to the audit log file.
      audit_write_logs:
        type: bool
        default: true
        description:
          - Whether audit events are written to disk.
      audit_log_format:
        type: str
        default: enriched
        choices: [raw, enriched, RAW, ENRICHED]
      audit_log_group:
        type: str
        default: ''
      audit_priority_boost:
        type: int
        default: 4
      audit_flush:
        type: str
        default: incremental_async
        choices:
          - none
          - incremental
          - incremental_async
          - data
          - sync
          - NONE
          - INCREMENTAL
          - INCREMENTAL_ASYNC
          - DATA
          - SYNC
      audit_freq:
        type: int
        default: 50
      audit_num_logs:
        type: int
        default: 5
      audit_name_format:
        type: str
        default: none
        choices:
          - none
          - hostname
          - fqd
          - numeric
          - user
          - NONE
          - HOSTNAME
          - FQD
          - NUMERIC
          - USER
      audit_name:
        type: str
        default: ''
      audit_max_log_file:
        type: int
        default: 256
      audit_max_log_file_action:
        type: str
        default: keep_logs
        choices:
          - ignore
          - syslog
          - suspend
          - rotate
          - keep_logs
          - IGNORE
          - SYSLOG
          - SUSPEND
          - ROTATE
          - KEEP_LOGS
      audit_verify_email:
        type: bool
        default: true
      audit_action_mail_acct:
        type: str
        default: ''
      audit_space_left:
        type: raw
        default: 75
      audit_space_left_action:
        type: str
        default: email
        choices:
          - ignore
          - syslog
          - rotate
          - email
          - exec
          - suspend
          - single
          - halt
          - IGNORE
          - SYSLOG
          - ROTATE
          - EMAIL
          - EXEC
          - SUSPEND
          - SINGLE
          - HALT
      audit_admin_space_left:
        type: int
        default: 50
      audit_admin_space_left_action:
        type: str
        default: suspend
        choices:
          - ignore
          - syslog
          - rotate
          - email
          - exec
          - suspend
          - single
          - halt
          - IGNORE
          - SYSLOG
          - ROTATE
          - EMAIL
          - EXEC
          - SUSPEND
          - SINGLE
          - HALT
      audit_disk_full_action:
        type: str
        default: suspend
        choices:
          - ignore
          - syslog
          - rotate
          - exec
          - suspend
          - single
          - halt
          - IGNORE
          - SYSLOG
          - ROTATE
          - EXEC
          - SUSPEND
          - SINGLE
          - HALT
      audit_disk_error_action:
        type: str
        default: suspend
        choices:
          - ignore
          - syslog
          - rotate
          - exec
          - suspend
          - single
          - halt
          - IGNORE
          - SYSLOG
          - ROTATE
          - EXEC
          - SUSPEND
          - SINGLE
          - HALT
      audit_tcp_listen_port:
        type: int
        default: 60
      audit_tcp_listen_queue:
        type: int
        default: 5
      audit_tcp_max_per_addr:
        type: int
        default: 1
      audit_use_libwrap:
        type: bool
        default: true
      audit_tcp_client_ports:
        type: str
        default: '1024-65535'
      audit_tcp_client_max_idle:
        type: int
        default: 0
      audit_transport:
        type: str
        default: tcp
        choices: [tcp, krb5, TCP, KRB5]
      audit_krb5_principal:
        type: str
        default: ''
      audit_krb5_key_file:
        type: str
        default: ''
      audit_distribute_network:
        type: bool
        default: false
      audit_q_depth:
        type: int
        default: 400
      audit_overflow_action:
        type: str
        default: syslog
        choices:
          - ignore
          - syslog
          - suspend
          - single
          - halt
          - exec
          - IGNORE
          - SYSLOG
          - SUSPEND
          - SINGLE
          - HALT
          - EXEC
      audit_max_restarts:
        type: int
        default: 10
      audit_plugin_dir:
        type: str
        default: /etc/audit/plugins.d
      force_overwrite_audit:
        type: bool
        default: true
      audit_sudo_log:
        type: str
        default: /var/log/sudo.log
      audit_rules_files:
        type: list
        elements: str
        default: []
        description:
          - Ordered list of rule template files to deploy from templates/.
