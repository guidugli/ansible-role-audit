---
_audit_packages:
  default:
    - auditd
    - audispd-plugins
  RedHat:
    - audit
    - audit-libs
  Rocky:
    - audit
    - audit-libs
  CentOS:
    - audit
    - audit-libs
  Fedora:
    - audit
    - audit-libs

audit_packages: >-
  {{
    _audit_packages[
      ansible_facts.get('distribution', '') ~ '-' ~ ansible_facts.get('distribution_major_version', '')
    ]
    | default(_audit_packages[ansible_facts.get('distribution', '')], true)
    | default(_audit_packages['default'])
  }}

audit_config_path: /etc/audit/auditd.conf
audit_rulesd_path: /etc/audit/rules.d

_container_types:
  - docker
  - podman
  - lxc
  - containerd
  - container

_audit_optional_string_vars:
  - audit_log_file
  - audit_log_group
  - audit_name
  - audit_action_mail_acct
  - audit_krb5_principal
  - audit_krb5_key_file
  - audit_plugin_dir
  - audit_tcp_client_ports

_audit_bool_vars:
  - audit_local_events
  - audit_write_logs
  - audit_verify_email
  - audit_use_libwrap
  - audit_distribute_network

_audit_lowercase_option_vars:
  - audit_log_format
  - audit_flush
  - audit_name_format
  - audit_max_log_file_action
  - audit_space_left_action
  - audit_admin_space_left_action
  - audit_disk_full_action
  - audit_disk_error_action
  - audit_transport
  - audit_overflow_action

_audit_config_items:
  - audit_log_file
  - audit_log_format
  - audit_log_group
  - audit_priority_boost
  - audit_flush
  - audit_freq
  - audit_num_logs
  - audit_name_format
  - audit_name
  - audit_max_log_file
  - audit_max_log_file_action
  - audit_action_mail_acct
  - audit_space_left
  - audit_space_left_action
  - audit_admin_space_left
  - audit_admin_space_left_action
  - audit_disk_full_action
  - audit_disk_error_action
  - audit_tcp_listen_port
  - audit_tcp_listen_queue
  - audit_tcp_max_per_addr
  - audit_tcp_client_ports
  - audit_tcp_client_max_idle
  - audit_transport
  - audit_krb5_principal
  - audit_krb5_key_file
  - audit_q_depth
  - audit_overflow_action
  - audit_max_restarts
  - audit_plugin_dir

_audit_vars:
  audit_log_file: log_file
  audit_log_format: log_format
  audit_log_group: log_group
  audit_priority_boost: priority_boost
  audit_flush: flush
  audit_freq: freq
  audit_num_logs: num_logs
  audit_name_format: name_format
  audit_name: name
  audit_max_log_file: max_log_file
  audit_max_log_file_action: max_log_file_action
  audit_action_mail_acct: action_mail_acct
  audit_space_left: space_left
  audit_space_left_action: space_left_action
  audit_admin_space_left: admin_space_left
  audit_admin_space_left_action: admin_space_left_action
  audit_disk_full_action: disk_full_action
  audit_disk_error_action: disk_error_action
  audit_tcp_listen_port: tcp_listen_port
  audit_tcp_listen_queue: tcp_listen_queue
  audit_tcp_max_per_addr: tcp_max_per_addr
  audit_tcp_client_ports: tcp_client_ports
  audit_tcp_client_max_idle: tcp_client_max_idle
  audit_transport: transport
  audit_krb5_principal: krb5_principal
  audit_krb5_key_file: krb5_key_file
  audit_q_depth: q_depth
  audit_overflow_action: overflow_action
  audit_max_restarts: max_restarts
  audit_local_events: local_events
  audit_write_logs: write_logs
  audit_verify_email: verify_email
  audit_use_libwrap: use_libwrap
  audit_distribute_network: distribute_network
  audit_plugin_dir: plugin_dir

