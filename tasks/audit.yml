---
# tasks/audit.yml
# Purpose:
#   Install and configure auditd and rule files.
#
# Normalized version:
# - enum-like values are written in lowercase consistently
# - apt cache refresh is Debian-family only
# - top-level fact deprecation is avoided via ansible_facts.get(...)

- name: Refresh apt cache on Debian-family systems
  ansible.builtin.apt:
    update_cache: true
  when:
    - ansible_facts.get('os_family', '') == 'Debian'

- name: Install audit packages
  ansible.builtin.package:
    name: "{{ audit_packages }}"
    state: present

- name: Enable and start auditd service
  ansible.builtin.systemd_service:
    name: auditd
    enabled: true
    state: started
  when:
    - ansible_facts.get('virtualization_type', '') not in _container_types
    - ansible_connection not in _container_types

- name: Check whether GRUB has audit=1 configured
  ansible.builtin.lineinfile:
    path: /etc/default/grub
    regexp: '^\s*GRUB_CMDLINE_LINUX.*audit=1'
    state: absent
  check_mode: true
  changed_when: false
  register: audit_cmdline_audit1
  when:
    - not audit_skip_grub_check
    - ansible_facts.get('virtualization_type', '') not in _container_types
    - ansible_connection not in _container_types

- name: Fail when GRUB does not contain audit=1
  ansible.builtin.fail:
    msg: '>>>> ERROR: Use grub role to add audit=1 option into cmdline <<<<'
  when:
    - not audit_skip_grub_check
    - ansible_facts.get('virtualization_type', '') not in _container_types
    - ansible_connection not in _container_types
    - not audit_cmdline_audit1.found

- name: Check whether GRUB has audit_backlog_limit configured
  ansible.builtin.lineinfile:
    path: /etc/default/grub
    regexp: '^\s*GRUB_CMDLINE_LINUX.*audit_backlog_limit=.+'
    state: absent
  check_mode: true
  changed_when: false
  register: audit_cmdline_backlog
  when:
    - not audit_skip_grub_check
    - ansible_facts.get('virtualization_type', '') not in _container_types
    - ansible_connection not in _container_types

- name: Fail when GRUB does not contain audit_backlog_limit
  ansible.builtin.fail:
    msg: '>>>> ERROR: Use grub role to add audit_backlog_limit option into cmdline <<<<'
  when:
    - not audit_skip_grub_check
    - ansible_facts.get('virtualization_type', '') not in _container_types
    - ansible_connection not in _container_types
    - not audit_cmdline_backlog.found

- name: Read UID_MIN from /etc/login.defs
  ansible.builtin.command:
    argv:
      - awk
      - '/^UID_MIN[[:space:]]+/ { print $2; exit }'
      - /etc/login.defs
  register: audit_uid_min_cmd
  changed_when: false

- name: Set audit_uid_min variable
  ansible.builtin.set_fact:
    audit_uid_min: "{{ audit_uid_min_cmd.stdout | default('1000', true) | trim }}"

- name: Apply boolean auditd configuration settings
  ansible.builtin.lineinfile:
    path: "{{ audit_config_path }}"
    regexp: '^{{ _audit_vars[item] }}\s*=.*$'
    line: "{{ _audit_vars[item] }} = {{ (lookup('vars', item) | bool) | ternary('yes', 'no') }}"
    mode: '0644'
  when: lookup('vars', item, default=omit) is not sameas omit
  loop:
    - audit_local_events
    - audit_write_logs
    - audit_verify_email
    - audit_use_libwrap
    - audit_distribute_network
  notify: reload auditd

- name: Apply normalized auditd configuration settings
  vars:
    audit_lowercase_option_vars:
      - audit_log_format
      - audit_flush
      - audit_name_format
      - audit_max_log_file_action
      - audit_space_left_action
      - audit_admin_space_left_action
      - audit_disk_full_action
      - audit_disk_error_action
      - audit_transport
      - audit_overflow_action
  ansible.builtin.lineinfile:
    path: "{{ audit_config_path }}"
    regexp: '^{{ _audit_vars[item] }}\s*=.*$'
    line: >-
      {{ _audit_vars[item] }} =
      {{ ((lookup('vars', item) | string) | lower) if item in audit_lowercase_option_vars else lookup('vars', item) }}
    mode: '0644'
  when: lookup('vars', item, default=omit) is not sameas omit
  loop:
    - audit_log_file
    - audit_log_format
    - audit_log_group
    - audit_priority_boost
    - audit_flush
    - audit_freq
    - audit_num_logs
    - audit_name_format
    - audit_name
    - audit_max_log_file
    - audit_max_log_file_action
    - audit_action_mail_acct
    - audit_space_left
    - audit_space_left_action
    - audit_admin_space_left
    - audit_admin_space_left_action
    - audit_disk_full_action
    - audit_disk_error_action
    - audit_tcp_listen_port
    - audit_tcp_listen_queue
    - audit_tcp_max_per_addr
    - audit_tcp_client_ports
    - audit_tcp_client_max_idle
    - audit_transport
    - audit_krb5_principal
    - audit_krb5_key_file
    - audit_q_depth
    - audit_overflow_action
    - audit_plugin_dir
  notify: reload auditd

- name: Find privileged commands
  ansible.builtin.command:
    argv:
      - find
      - /
      - -xdev
      - '('
      - -perm
      - -4000
      - -o
      - -perm
      - -2000
      - ')'
      - -type
      - f
      - -print
  register: audit_privileged_commands_cmd
  changed_when: false

- name: Set privileged command list
  ansible.builtin.set_fact:
    audit_priv_command: "{{ audit_privileged_commands_cmd.stdout_lines | default([]) }}"

- name: Deploy selected audit rule templates
  ansible.builtin.template:
    src: "{{ item }}"
    dest: "{{ audit_rulesd_path }}/{{ item }}"
    owner: root
    group: root
    mode: '0600'
    force: "{{ force_overwrite_audit | default(false) }}"
  loop: "{{ audit_rules_files | default([]) }}"
  notify: reload auditd

- name: Ensure audit configuration is immutable
  ansible.builtin.copy:
    dest: "{{ audit_rulesd_path }}/99-finalize.rules"
    content: |
      -e 2
    owner: root
    group: root
    mode: '0600'
  notify: reload auditd
