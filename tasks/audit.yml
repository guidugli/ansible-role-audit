---
- name: Refresh apt cache on Debian-family systems
  ansible.builtin.apt:
    update_cache: true
  when: ansible_facts.get('os_family', '') == 'Debian'

- name: Install audit packages
  ansible.builtin.package:
    name: '{{ audit_packages }}'
    state: present

- name: Enable and start auditd service on non-container targets
  ansible.builtin.systemd_service:
    name: auditd
    enabled: true
    state: started
  when:
    - ansible_facts.get('virtualization_type', '') not in _container_types
    - ansible_connection not in _container_types

- name: Check whether GRUB contains audit=1
  ansible.builtin.lineinfile:
    path: /etc/default/grub
    regexp: '^\s*GRUB_CMDLINE_LINUX.*audit=1'
    state: absent
  check_mode: true
  changed_when: false
  register: audit_cmdline_audit1
  when:
    - not audit_skip_grub_check
    - ansible_facts.get('virtualization_type', '') not in _container_types
    - ansible_connection not in _container_types

- name: Fail when GRUB does not contain audit=1
  ansible.builtin.fail:
    msg: >-
      GRUB kernel parameters do not contain audit=1. Manage bootloader settings
      in a separate GRUB role or host baseline.
  when:
    - not audit_skip_grub_check
    - ansible_facts.get('virtualization_type', '') not in _container_types
    - ansible_connection not in _container_types
    - not audit_cmdline_audit1.found

- name: Check whether GRUB contains audit_backlog_limit
  ansible.builtin.lineinfile:
    path: /etc/default/grub
    regexp: '^\s*GRUB_CMDLINE_LINUX.*audit_backlog_limit=.+'
    state: absent
  check_mode: true
  changed_when: false
  register: audit_cmdline_backlog
  when:
    - not audit_skip_grub_check
    - ansible_facts.get('virtualization_type', '') not in _container_types
    - ansible_connection not in _container_types

- name: Fail when GRUB does not contain audit_backlog_limit
  ansible.builtin.fail:
    msg: >-
      GRUB kernel parameters do not contain audit_backlog_limit. Manage
      bootloader settings in a separate GRUB role or host baseline.
  when:
    - not audit_skip_grub_check
    - ansible_facts.get('virtualization_type', '') not in _container_types
    - ansible_connection not in _container_types
    - not audit_cmdline_backlog.found

- name: Read UID_MIN from /etc/login.defs
  ansible.builtin.command:
    argv:
      - awk
      - '/^UID_MIN[[:space:]]+/ { print $2; exit }'
      - /etc/login.defs
  register: audit_uid_min_cmd
  changed_when: false

- name: Set minimum audited UID
  ansible.builtin.set_fact:
    audit_uid_min: '{{ audit_uid_min_cmd.stdout | default("1000", true) | trim }}'

- name: Apply boolean auditd.conf settings
  ansible.builtin.lineinfile:
    path: '{{ audit_config_path }}'
    regexp: '^{{ _audit_vars[item] }}\s*=.*$'
    line: >-
      {{ _audit_vars[item] }} =
      {{ (lookup('vars', item) | bool) | ternary('yes', 'no') }}
    mode: '0644'
  loop: '{{ _audit_bool_vars }}'
  notify: reload auditd

- name: Apply scalar auditd.conf settings
  ansible.builtin.lineinfile:
    path: '{{ audit_config_path }}'
    regexp: '^{{ _audit_vars[item] }}\s*=.*$'
    line: >-
      {{ _audit_vars[item] }} =
      {{
        ((lookup('vars', item) | string) | lower)
        if item in _audit_lowercase_option_vars
        else (lookup('vars', item) | string)
      }}
    mode: '0644'
  loop: '{{ _audit_config_items }}'
  when:
    - item not in _audit_optional_string_vars
      or (lookup('vars', item) | string | trim | length > 0)
  notify: reload auditd

- name: Find privileged commands
  ansible.builtin.command:
    argv:
      - find
      - /
      - -xdev
      - '('
      - -perm
      - -4000
      - -o
      - -perm
      - -2000
      - ')'
      - -type
      - f
      - -print
  register: audit_privileged_commands_cmd
  changed_when: false

- name: Set privileged command list
  ansible.builtin.set_fact:
    audit_priv_command: '{{ audit_privileged_commands_cmd.stdout_lines | default([]) }}'

- name: Deploy selected audit rule templates
  ansible.builtin.template:
    src: '{{ item }}'
    dest: '{{ audit_rulesd_path }}/{{ item }}'
    owner: root
    group: root
    mode: '0600'
    force: '{{ force_overwrite_audit }}'
  loop: '{{ audit_rules_files }}'
  notify: reload auditd

- name: Ensure immutable finalize rule is present
  ansible.builtin.copy:
    dest: '{{ audit_rulesd_path }}/99-finalize.rules'
    content: |
      -e 2
    owner: root
    group: root
    mode: '0600'
  notify: reload auditd
