---
# tasks/assert.yml
# Extra validation not fully covered by meta/argument_specs.yml.

- name: Ensure audit_sudo_log is a non-empty string
  ansible.builtin.assert:
    quiet: true
    that:
      - audit_sudo_log is string
      - audit_sudo_log | length > 0
    fail_msg: >-
      audit_sudo_log must be a non-empty string.

- name: Ensure audit_flush/freq combination is valid
  ansible.builtin.assert:
    quiet: true
    that:
      - audit_freq is defined
      - audit_freq | int >= 0
    fail_msg: >-
      audit_freq must be defined and non-negative when audit_flush is INCREMENTAL or INCREMENTAL_ASYNC.
  when:
    - audit_flush is defined
    - audit_flush | upper in ['INCREMENTAL', 'INCREMENTAL_ASYNC']

- name: Ensure audit_name is provided when audit_name_format is USER
  ansible.builtin.assert:
    quiet: true
    that:
      - audit_name is defined
      - audit_name is string
      - audit_name | length > 0
    fail_msg: >-
      audit_name must be defined and non-empty when audit_name_format is USER.
  when:
    - audit_name_format is defined
    - audit_name_format | upper == 'USER'

- name: Ensure Kerberos settings are provided when transport is KRB5
  ansible.builtin.assert:
    quiet: true
    that:
      - audit_krb5_principal is defined
      - audit_krb5_principal is string
      - audit_krb5_principal | length > 0
      - audit_krb5_key_file is defined
      - audit_krb5_key_file is string
      - audit_krb5_key_file | length > 0
    fail_msg: >-
      audit_krb5_principal and audit_krb5_key_file must be defined when audit_transport is KRB5.
  when:
    - audit_transport is defined
    - audit_transport | upper == 'KRB5'

- name: Validate audit_rules_files entries are strings
  ansible.builtin.assert:
    quiet: true
    that:
      - item is string
      - item | length > 0
    fail_msg: >-
      Each entry in audit_rules_files must be a non-empty string. Invalid entry: {{ item }}
  loop: "{{ audit_rules_files | default([]) }}"
  when:
    - audit_rules_files is defined
    - audit_rules_files | length > 0
