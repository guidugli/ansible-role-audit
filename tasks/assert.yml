---
- name: Validate audit_space_left format
  ansible.builtin.assert:
    quiet: true
    that:
      - >-
        (audit_space_left is number)
        or
        (
          audit_space_left is string
          and
          (
            audit_space_left | regex_search('^[0-9]+%?$')
          )
        )
    fail_msg: >-
      audit_space_left must be an integer MiB value or a percentage string such as 5%.

- name: Validate audit_flush and audit_freq combination
  ansible.builtin.assert:
    quiet: true
    that:
      - audit_freq | int >= 0
    fail_msg: >-
      audit_freq must be zero or greater when audit_flush is incremental or
      incremental_async.
  when: audit_flush | string | lower in ['incremental', 'incremental_async']

- name: Validate audit_name when audit_name_format is user
  ansible.builtin.assert:
    quiet: true
    that:
      - audit_name | string | trim | length > 0
    fail_msg: >-
      audit_name must be set to a non-empty value when audit_name_format is user.
  when: audit_name_format | string | lower == 'user'

- name: Validate Kerberos inputs when audit_transport is krb5
  ansible.builtin.assert:
    quiet: true
    that:
      - audit_krb5_principal | string | trim | length > 0
      - audit_krb5_key_file | string | trim | length > 0
    fail_msg: >-
      audit_krb5_principal and audit_krb5_key_file must both be set when
      audit_transport is krb5.
  when: audit_transport | string | lower == 'krb5'

- name: Validate audit_sudo_log is non-empty
  ansible.builtin.assert:
    quiet: true
    that:
      - audit_sudo_log | string | trim | length > 0
    fail_msg: audit_sudo_log must be a non-empty path.

- name: Validate requested audit rule templates are supported
  ansible.builtin.assert:
    quiet: true
    that:
      - item in _audit_available_rule_templates
    fail_msg: >-
      Unsupported rule template '{{ item }}'. Supported values are:
      {{ _audit_available_rule_templates | join(', ') }}
  loop: '{{ audit_rules_files }}'
